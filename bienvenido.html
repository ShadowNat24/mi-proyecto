<!DOCTYPE html>
<html lang="es">
<head>

    <title>Panel de Administración - Todo en Blanco</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cargo</th>
                    <th>Acciones</th>

            </thead>
            <tbody>
                <tr>
                    <td>1.890.432-1</td>

                        <button onclick="alert('Modificando...')">Modificar</button>
                        <button onclick="confirm('¿Eliminar empleado?')">Borrar</button>
                    </td>
                </tr>
                <tr>
                    <td>4.567.890-2</td>
                    <td>Pancho</td>
                    <td>García</td>
                    <td>Ventas Mayoristas</td>
                    <td>
                        <button onclick="alert('Modificando...')">Modificar</button>

                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
