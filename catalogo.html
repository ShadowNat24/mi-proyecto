<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Todo en Blanco</title>
    <link rel="stylesheet" href="css/estilo.css">  
</head>
<body>

    <header>
        <div id="logo-container">
            <img src="assets/img/elvis.jpg" alt="Logo Todo en Blanco" width="150">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="Nosotros.html">Sobre Nosotros</a></li>
                <li><a href="consultas.html">Contáctanos</a></li>
                <li><a href="SolicitudTrabajo.html">Trabaja con nosotros</a></li>
                <li><a href="login.html">Ingresar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Catálogo de Productos</h1>

        <a href="index.html">
            <button>Volver al inicio</button>
        </a>

        <hr>

        <h2>Consulta de Productos</h2>

        <form>

            <!-- Nombre -->
            <label>Nombre:</label><br>
            <input type="text" name="nombre" placeholder="Ej: Juan"
            required autocomplete="given-name"><br><br>

            <!-- Apellido -->
            <label>Apellido:</label><br>
            <input type="text" name="apellido" placeholder="Ej: Pérez"
            required autocomplete="family-name"><br><br>

            <!-- Teléfono -->
            <label>Teléfono:</label><br>
            <input type="tel" name="telefono" placeholder="Ej: 099123456"
            required pattern="0[0-9]{8}" inputmode="numeric"
            autocomplete="tel"><br><br>

            <!-- Email -->
            <label>Correo electrónico:</label><br>
            <input type="email" name="email" placeholder="Ej: correo@gmail.com"
            required autocomplete="email"><br><br>

            <!-- Tipo de consulta -->
            <label>Tipo de consulta:</label><br>
            <select name="consulta" required>
                <option value="">Seleccionar</option>
                <option>Catálogo</option>
                <option>Repuestos</option>
                <option>Desperfectos</option>
            </select><br><br>

            <!-- Descripción -->
            <label>Descripción:</label><br>
            <textarea name="descripcion" placeholder="Explique qué necesita..."
            required></textarea><br><br>

            <!-- Botón -->
            <button type="submit">Enviar consulta</button>

        </form>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Todo en Blanco - Gestión Logística</p>
    </footer>

</body>
</html>
